<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arkusze ocen – 3tla.local</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1400px; margin: 2rem auto; padding: 0 1rem; background: #f9f9f9; }
    .hidden { display: none; }
    input, button { padding: 0.7rem; margin: 0.4rem 0; font-size: 1rem; }
    button { background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #0055aa; }
    button.red { background: #c00; }
    table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background: white; }
    th, td { border: 1px solid #999; padding: 0.8rem; text-align: center; }
    th { background: #e3f2fd; position: sticky; top: 0; z-index: 10; }
    .uczniowie-col { background: #c8e6c9; width: 240px; text-align: left; padding-left: 15px; font-weight: bold; }
    nav { margin: 1.5rem 0; padding: 1rem; background: #f0f0f0; border-radius: 8px; }
    nav a { margin-right: 1.5rem; color: #0066cc; text-decoration: none; font-weight: 500; }
    .arkusz-item {
      border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; border-radius: 8px; background: white;
      display: flex; justify-content: space-between; align-items: center;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACzVKOmFK87VJJvBGCW921yrxbpKgYEKU",
      authDomain: "iiitla-zadania.firebaseapp.com",
      projectId: "iiitla-zadania",
      storageBucket: "iiitla-zadania.firebasestorage.app",
      messagingSenderId: "753248383455",
      appId: "1:753248383455:web:f39ab717514c979913146a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMINS = ["mbecela@3tla.local", "nnoczynska@3tla.local"];

    let currentUserEmail = "";
    let currentArkuszId = null;

    // Helpers
    const $ = id => document.getElementById(id);
    const show = el => el?.classList.remove("hidden");
    const hide = el => el?.classList.add("hidden");

    function isAdmin(email) {
      return ADMINS.includes(email);
    }

    // Tworzenie nowego arkusza
    async function createArkusz() {
      const nazwa = $("arkusz-nazwa").value.trim();
      if (!nazwa) {
        alert("Podaj nazwę arkusza!");
        return;
      }

      try {
        await addDoc(collection(db, "arkusze_ocen"), {
          nazwa,
          createdBy: currentUserEmail,
          createdAt: Timestamp.now(),
          uczniowie: [],
          kolumny: []
        });

        alert("Arkusz utworzony!");
        hide($("form-arkusz"));
        loadArkusze();
      } catch (err) {
        alert("Błąd tworzenia: " + err.message);
      }
    }

    // Ładowanie listy arkuszy
    async function loadArkusze() {
      const container = $("arkusze-list");
      container.innerHTML = "<p>Ładowanie...</p>";

      try {
        const q = query(collection(db, "arkusze_ocen"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";

        if (snap.empty) {
          container.innerHTML = "<p>Brak arkuszy ocen.</p>";
          return;
        }

        snap.forEach(docSnap => {
          const d = docSnap.data();
          const id = docSnap.id;

          const div = document.createElement("div");
          div.className = "arkusz-item";
          div.innerHTML = `
            <div><strong>${d.nazwa}</strong><br><small>${d.createdAt.toDate().toLocaleDateString('pl-PL')}</small></div>
          `;

          const btn = document.createElement("button");
          btn.textContent = "Otwórz";
          btn.onclick = () => openArkusz(id, d);
          div.appendChild(btn);
          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = `<p style="color:#c00">Błąd: ${err.message}</p>`;
      }
    }

    // Otwieranie arkusza
    function openArkusz(id, data) {
      currentArkuszId = id;
      hide($("arkusze-list"));
      show($("arkusz-form"));
      $("arkusz-tytul").textContent = data.nazwa;

      const tbody = $("oceny-table").querySelector("tbody");
      tbody.innerHTML = "";

      if (data.uczniowie && data.uczniowie.length > 0) {
        data.uczniowie.forEach(name => addUczienRow(name));
      } else {
        addUczienRow("");
      }

      const headerRow = $("oceny-table").querySelector("thead tr");
      headerRow.innerHTML = '<th class="uczniowie-col">Uczeń</th>';

      if (data.kolumny && data.kolumny.length > 0) {
        data.kolumny.forEach(kol => addKolumnaZData(kol));
      }
    }

    // Globalne funkcje
    window.addUczienRow = function(imie = "") {
      const tbody = $("oceny-table").querySelector("tbody");
      const tr = document.createElement("tr");
      tr.innerHTML = `<td><input type="text" class="uczen-input" value="${imie}" placeholder="Imię i nazwisko ucznia"></td>`;
      tbody.appendChild(tr);
    };

    window.addKolumna = function() {
      const dataZadania = prompt("Podaj datę zadania (np. 2026-04-20):");
      if (!dataZadania) return;
      addKolumnaZData(dataZadania);
    };

    function addKolumnaZData(dataZadania) {
      const headerRow = $("oceny-table").querySelector("thead tr");
      const th = document.createElement("th");
      th.innerHTML = `${dataZadania}<br><button onclick="this.parentElement.remove()" class="red" style="font-size:0.75rem;">×</button>`;
      headerRow.appendChild(th);

      document.querySelectorAll("#oceny-table tbody tr").forEach(row => {
        const td = document.createElement("td");
        td.innerHTML = `
          <input type="checkbox" title="Obecny"> 
          <input type="number" placeholder="Punkty" style="width:70px; margin-left:8px;" min="0">
        `;
        row.appendChild(td);
      });
    }

    // Zapisywanie arkusza
    window.saveArkusz = async function() {
      if (!currentArkuszId) {
        alert("Nie wybrano arkusza!");
        return;
      }

      const uczniowie = Array.from(document.querySelectorAll(".uczen-input"))
                             .map(input => input.value.trim())
                             .filter(name => name);

      const kolumny = [];
      document.querySelectorAll("#oceny-table thead th:not(.uczniowie-col)").forEach(th => {
        kolumny.push(th.textContent.trim().split('\n')[0]);
      });

      try {
        await updateDoc(doc(db, "arkusze_ocen", currentArkuszId), {
          uczniowie,
          kolumny,
          lastModified: Timestamp.now()
        });

        alert("Arkusz zapisany pomyślnie!");
        hide($("arkusz-form"));
        show($("arkusze-list"));
        loadArkusze();
      } catch (err) {
        alert("Błąd zapisu:\n" + err.message);
        console.error(err);
      }
    };

    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = "index.html"; return; }

      currentUserEmail = user.email;

      if (!isAdmin(user.email)) {
        document.body.innerHTML = `<div style="text-align:center;padding:5rem;"><h2>Brak dostępu</h2><p>Tylko administratorzy mają dostęp.</p><a href="index.html">← Powrót</a></div>`;
        return;
      }

      hide($("loading"));
      show($("content"));
      $("current-user").textContent = user.email;
      loadArkusze();
    });

    document.addEventListener("DOMContentLoaded", () => {
      $("btn-logout")?.addEventListener("click", () => signOut(auth));
      $("btn-nowy-arkusz")?.addEventListener("click", () => show($("form-arkusz")));
      $("btn-anuluj")?.addEventListener("click", () => hide($("form-arkusz")));
      $("btn-zapisz-arkusz")?.addEventListener("click", createArkusz);
      $("btn-dodaj-ucznia")?.addEventListener("click", () => addUczienRow(""));
      $("btn-dodaj-kolumne")?.addEventListener("click", addKolumna);
    });
  </script>
</head>
<body>

  <div id="loading"><h2>Trwa sprawdzanie uprawnień...</h2></div>

  <div id="content" class="hidden">
    <nav>
      <a href="index.html">← Strona główna</a>
      <a href="dokumenty.html">Faktury</a>
      <a href="produkcja.html">Produkcja</a>
      <a href="harmonogram.html">Harmonogram</a>
      <a href="https://zspsycow-3tla-gr11.odoo.com" target="_blank">WMS</a>
    </nav>

    <h1>Arkusze ocen</h1>
    <p>Zalogowany jako: <strong id="current-user"></strong></p>
    <button id="btn-logout" class="logout">Wyloguj się</button>

    <button id="btn-nowy-arkusz" style="margin:1.5rem 0;">Nowy arkusz ocen</button>

    <div id="form-arkusz" class="hidden" style="background:white; padding:2rem; border-radius:8px; border:1px solid #ddd;">
      <h2>Nowy arkusz ocen</h2>
      <input id="arkusz-nazwa" placeholder="Nazwa arkusza (np. JavaScript - Grupa 11)" style="width:100%; font-size:1.1rem;">
      <div style="margin-top:1.5rem;">
        <button id="btn-zapisz-arkusz">Utwórz arkusz</button>
        <button id="btn-anuluj" style="background:#757575; margin-left:1rem;">Anuluj</button>
      </div>
    </div>

    <div id="arkusz-form" class="hidden">
      <h2 id="arkusz-tytul"></h2>

      <div style="margin:1rem 0;">
        <button id="btn-dodaj-ucznia">+ Dodaj ucznia</button>
        <button id="btn-dodaj-kolumne">+ Dodaj zadanie / datę</button>
        <button onclick="saveArkusz()" style="background:#2e7d32;">Zapisz arkusz</button>
        <button onclick="hide($('arkusz-form')); show($('arkusze-list'))" style="background:#757575;">Powrót do listy</button>
      </div>

      <table id="oceny-table">
        <thead>
          <tr>
            <th class="uczniowie-col">Uczeń</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="arkusze-list"></div>
  </div>

</body>
</html>
