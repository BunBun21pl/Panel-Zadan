<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arkusze ocen – 3tla.local</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
    }
    .hidden { display: none; }
    input, button, select {
      padding: 0.7rem;
      margin: 0.5rem 0;
      font-size: 1rem;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #0055aa; }
    button.red { background: #c00; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      background: white;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 0.8rem;
      text-align: center;
    }
    th { background: #e3f2fd; font-weight: 600; }
    .uczniowie-header { background: #c8e6c9; width: 220px; }
    nav {
      margin: 1.5rem 0;
      padding: 1rem;
      background: #f0f0f0;
      border-radius: 8px;
    }
    nav a {
      margin-right: 1.5rem;
      color: #0066cc;
      text-decoration: none;
      font-weight: 500;
    }
    .arkusz-item {
      border: 1px solid #ddd;
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 8px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACzVKOmFK87VJJvBGCW921yrxbpKgYEKU",
      authDomain: "iiitla-zadania.firebaseapp.com",
      projectId: "iiitla-zadania",
      storageBucket: "iiitla-zadania.firebasestorage.app",
      messagingSenderId: "753248383455",
      appId: "1:753248383455:web:f39ab717514c979913146a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMINS = ["mbecela@3tla.local", "nnoczynska@3tla.local"];

    let currentUserEmail = "";
    let currentArkuszId = null;

    const $ = id => document.getElementById(id);
    const show = el => el?.classList.remove("hidden");
    const hide = el => el?.classList.add("hidden");

    // Sprawdzenie czy admin
    function isAdmin(email) {
      return ADMINS.includes(email);
    }

    // Tworzenie nowego arkusza ocen
    async function createArkusz() {
      const nazwa = $("arkusz-nazwa").value.trim();
      if (!nazwa) {
        alert("Podaj nazwę arkusza ocen!");
        return;
      }

      try {
        const docRef = await addDoc(collection(db, "arkusze_ocen"), {
          nazwa,
          createdBy: currentUserEmail,
          createdAt: Timestamp.now(),
          uczniowie: [],
          kolumny: []   // daty zadań
        });

        alert("Arkusz ocen został utworzony!");
        hide($("form-arkusz"));
        loadArkusze();
      } catch (err) {
        alert("Błąd: " + err.message);
      }
    }

    // Ładowanie listy arkuszy
    async function loadArkusze() {
      const container = $("arkusze-list");
      container.innerHTML = "<p>Ładowanie...</p>";

      try {
        const q = query(collection(db, "arkusze_ocen"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";

        if (snap.empty) {
          container.innerHTML = "<p>Nie ma jeszcze żadnych arkuszy ocen.</p>";
          return;
        }

        snap.forEach(docSnap => {
          const d = docSnap.data();
          const id = docSnap.id;

          const div = document.createElement("div");
          div.className = "arkusz-item";
          div.innerHTML = `
            <div>
              <strong>${d.nazwa}</strong><br>
              <small>Utworzony: ${d.createdAt.toDate().toLocaleDateString('pl-PL')}</small>
            </div>
          `;

          const openBtn = document.createElement("button");
          openBtn.textContent = "Otwórz arkusz";
          openBtn.onclick = () => openArkusz(id);
          div.appendChild(openBtn);

          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = `<p style="color:#c00">Błąd: ${err.message}</p>`;
      }
    }

    // Otwieranie arkusza (do wypełniania)
    async function openArkusz(id) {
      currentArkuszId = id;
      // Tu będzie rozwinięta logika w kolejnej wersji
      alert("Funkcja otwierania arkusza w trakcie przygotowania.\n\nNa razie możesz tylko tworzyć nowe arkusze.");
    }

    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      currentUserEmail = user.email;

      if (!isAdmin(user.email)) {
        document.body.innerHTML = `
          <div style="text-align:center; padding:4rem;">
            <h2>Brak dostępu</h2>
            <p>Ta strona jest dostępna tylko dla administratorów.</p>
            <a href="index.html">← Powrót do strony głównej</a>
          </div>`;
        return;
      }

      hide($("loading"));
      show($("content"));
      $("current-user").textContent = user.email;
      loadArkusze();
    });

    document.addEventListener("DOMContentLoaded", () => {
      $("btn-logout")?.addEventListener("click", () => signOut(auth));
      $("btn-nowy-arkusz")?.addEventListener("click", () => show($("form-arkusz")));
      $("btn-anuluj")?.addEventListener("click", () => hide($("form-arkusz")));
      $("btn-zapisz-arkusz")?.addEventListener("click", createArkusz);
    });
  </script>
</head>
<body>

  <div id="loading">
    <h2>Trwa sprawdzanie uprawnień...</h2>
  </div>

  <div id="content" class="hidden">
    <nav>
      <a href="index.html">← Strona główna</a>
      <a href="dokumenty.html">Faktury</a>
      <a href="produkcja.html">Produkcja</a>
      <a href="harmonogram.html">Harmonogram</a>
      <a href="https://zspsycow-3tla-gr11.odoo.com" target="_blank">WMS</a>
    </nav>

    <h1>Arkusze ocen</h1>
    <p>Zalogowany jako: <strong id="current-user"></strong></p>
    <button id="btn-logout" class="logout">Wyloguj się</button>

    <button id="btn-nowy-arkusz" style="margin:1.5rem 0;">Nowy arkusz ocen</button>

    <!-- Formularz tworzenia arkusza -->
    <div id="form-arkusz" class="hidden" style="background:white; padding:1.5rem; border-radius:8px; border:1px solid #ddd;">
      <h2>Nowy arkusz ocen</h2>
      <input id="arkusz-nazwa" placeholder="Nazwa arkusza (np. Programowanie - Grupa 11)" style="width:100%;">

      <div style="margin-top:1.5rem;">
        <button id="btn-zapisz-arkusz">Utwórz arkusz</button>
        <button id="btn-anuluj" style="background:#757575; margin-left:1rem;">Anuluj</button>
      </div>
    </div>

    <h2>Lista arkuszy ocen</h2>
    <div id="arkusze-list"></div>
  </div>

</body>
</html>
