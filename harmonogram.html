<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harmonogram produkcji – 3tla.local</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
    }
    .hidden { display: none; }
    input, button {
      padding: 0.7rem;
      margin: 0.5rem 0;
      font-size: 1rem;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #0055aa; }
    button.red { background: #c00; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      background: white;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 0.8rem;
      text-align: center;
    }
    th { background: #e3f2fd; }
    .period-header { background: #bbdefb; font-weight: bold; }
    nav { margin: 1.5rem 0; padding: 1rem; background: #f0f0f0; border-radius: 8px; }
    nav a { margin-right: 1.5rem; color: #0066cc; text-decoration: none; font-weight: 500; }
  </style>

  <!-- jsPDF + AutoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACzVKOmFK87VJJvBGCW921yrxbpKgYEKU",
      authDomain: "iiitla-zadania.firebaseapp.com",
      projectId: "iiitla-zadania",
      storageBucket: "iiitla-zadania.firebasestorage.app",
      messagingSenderId: "753248383455",
      appId: "1:753248383455:web:f39ab717514c979913146a",
      measurementId: "G-9DQCJ8T5QQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserEmail = "";

    const $ = id => document.getElementById(id);

    // === Tworzenie nowego harmonogramu ===
    async function createHarmonogram() {
      const nazwaProduktu = $("nazwa-produktu").value.trim();
      const numerHarmonogramu = $("numer-harmonogramu").value.trim();

      if (!nazwaProduktu || !numerHarmonogramu) {
        alert("Wypełnij nazwę produktu i numer harmonogramu!");
        return;
      }

      const periods = Array.from(document.querySelectorAll(".period-input")).map(input => input.value.trim()).filter(v => v);

      if (periods.length === 0) {
        alert("Dodaj przynajmniej jeden okres!");
        return;
      }

      const rows = [];
      document.querySelectorAll("#harmonogram-table tbody tr").forEach(row => {
        const nazwa = row.cells[0].textContent;
        const values = Array.from(row.querySelectorAll("input")).map(input => input.value.trim());
        rows.push({ nazwa, values });
      });

      try {
        await addDoc(collection(db, "harmonogramy"), {
          nazwaProduktu,
          numerHarmonogramu,
          periods,
          rows,
          createdBy: currentUserEmail,
          createdAt: Timestamp.now()
        });

        alert("Harmonogram zapisany!");
        hide($("form-section"));
        loadHarmonogramy();
      } catch (err) {
        alert("Błąd zapisu: " + err.message);
      }
    }

    // === Eksport do PDF ===
    function exportToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const nazwa = $("nazwa-produktu").value || "Brak nazwy";
      const numer = $("numer-harmonogramu").value || "Brak numeru";

      doc.setFont("times", "bold");
      doc.setFontSize(18);
      doc.text("HARMONOGRAM PRODUKCJI", 105, 15, { align: "center" });

      doc.setFontSize(12);
      doc.text(`Produkt: ${nazwa}`, 20, 30);
      doc.text(`Numer harmonogramu: ${numer}`, 20, 40);

      // Zbieranie danych z tabeli
      const headers = ["Pozycja"];
      document.querySelectorAll(".period-header").forEach(th => {
        headers.push(th.textContent.split('\n')[0]);
      });

      const body = [];
      document.querySelectorAll("#harmonogram-table tbody tr").forEach(row => {
        const rowData = [row.cells[0].textContent];
        row.querySelectorAll("input").forEach(input => {
          rowData.push(input.value || "-");
        });
        body.push(rowData);
      });

      doc.autoTable({
        startY: 50,
        head: [headers],
        body: body,
        theme: 'grid',
        styles: { font: "times", fontSize: 10 },
        headStyles: { fillColor: [66, 139, 202] }
      });

      doc.save(`Harmonogram_${numer}_${nazwa.replace(/ /g, '_')}.pdf`);
    }

    // === Dodawanie okresu ===
    function addPeriod() {
      const headerRow = document.querySelector("#harmonogram-table thead tr");
      const colCount = headerRow.children.length;

      const newTh = document.createElement("th");
      newTh.className = "period-header";
      newTh.innerHTML = `Okres ${colCount}<br><input type="text" class="period-input" placeholder="np. Tydzień ${colCount}" style="width:90%; margin-top:4px;">`;
      headerRow.appendChild(newTh);

      document.querySelectorAll("#harmonogram-table tbody tr").forEach(row => {
        const td = document.createElement("td");
        td.innerHTML = `<input type="text" placeholder="wartość">`;
        row.appendChild(td);
      });
    }

    // === Inicjalizacja tabeli ===
    function initTable() {
      const table = $("harmonogram-table");
      table.innerHTML = `
        <thead>
          <tr>
            <th style="width:280px;">Pozycja</th>
            <th class="period-header">Okres 1<br><input type="text" class="period-input" placeholder="np. Tydzień 1"></th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Zapotrzebowanie brutto</td><td><input type="text"></td></tr>
          <tr><td>Stan magazynowy</td><td><input type="text"></td></tr>
          <tr><td>Zapotrzebowanie netto</td><td><input type="text" readonly style="background:#f0f0f0;"></td></tr>
          <tr><td>Dostawa</td><td><input type="text"></td></tr>
          <tr><td>Zamówienie</td><td><input type="text"></td></tr>
        </tbody>
      `;
    }

    // Automatyczne obliczanie zapotrzebowania netto
    function calculateNetto() {
      const rows = document.querySelectorAll("#harmonogram-table tbody tr");
      const bruttoRow = rows[0];
      const stanRow = rows[1];
      const nettoRow = rows[2];

      const bruttoInputs = bruttoRow.querySelectorAll("input");
      const stanInputs = stanRow.querySelectorAll("input");
      const nettoInputs = nettoRow.querySelectorAll("input");

      for (let i = 0; i < bruttoInputs.length; i++) {
        const brutto = parseFloat(bruttoInputs[i].value) || 0;
        const stan = parseFloat(stanInputs[i].value) || 0;
        nettoInputs[i].value = (brutto - stan).toFixed(2);
      }
    }

    // Nasłuch zmian w tabeli
    function addAutoCalculate() {
      document.getElementById("harmonogram-table").addEventListener("input", (e) => {
        if (e.target.tagName === "INPUT") calculateNetto();
      });
    }

    // Ładowanie listy
    async function loadHarmonogramy() {
      const container = $("harmonogramy-list");
      container.innerHTML = "<p>Ładowanie...</p>";

      try {
        const q = query(collection(db, "harmonogramy"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";

        if (snap.empty) {
          container.innerHTML = "<p>Brak harmonogramów.</p>";
          return;
        }

        snap.forEach(docSnap => {
          const d = docSnap.data();
          const div = document.createElement("div");
          div.style = "border:1px solid #ddd; padding:1rem; margin:1rem 0; border-radius:8px; background:white;";
          div.innerHTML = `
            <h3>${d.numerHarmonogramu} — ${d.nazwaProduktu}</h3>
            <small>Utworzony przez: ${d.createdBy} • ${d.createdAt.toDate().toLocaleString('pl-PL')}</small>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = `<p style="color:#c00">Błąd: ${err.message}</p>`;
      }
    }

    // Inicjalizacja
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      currentUserEmail = user.email;
      hide($("loading"));
      show($("content"));
      $("current-user").textContent = user.email;
      loadHarmonogramy();
      initTable();
      addAutoCalculate();
    });

    document.addEventListener("DOMContentLoaded", () => {
      $("btn-logout")?.addEventListener("click", () => signOut(auth));
      $("btn-nowy-harmonogram")?.addEventListener("click", () => show($("form-section")));
      $("btn-anuluj")?.addEventListener("click", () => hide($("form-section")));
      $("btn-zapisz-harmonogram")?.addEventListener("click", createHarmonogram);
      $("btn-dodaj-okres")?.addEventListener("click", addPeriod);
      $("btn-export-pdf")?.addEventListener("click", exportToPDF);
    });
  </script>
</head>
<body>

  <div id="loading"><h2>Ładowanie...</h2></div>

  <div id="content" class="hidden">
    <nav>
      <a href="index.html">← Strona główna</a>
      <a href="oceny.html">Oceny</a>
      <a href="dokumenty.html">Faktury</a>
      <a href="produkcja.html">Produkcja</a>
      <a href="https://zspsycow-3tla-gr11.odoo.com" target="_blank">WMS</a>
    </nav>

    <h1>Harmonogram produkcji</h1>
    <p>Zalogowany jako: <strong id="current-user"></strong></p>
    <button id="btn-logout" class="logout">Wyloguj się</button>

    <button id="btn-nowy-harmonogram" style="margin:1.5rem 0;">Nowy harmonogram produkcji</button>

    <!-- Formularz -->
    <div id="form-section" class="hidden" style="background:white; padding:1.5rem; border-radius:8px; border:1px solid #ddd;">
      <h2>Nowy harmonogram produkcji</h2>
      <input id="nazwa-produktu" placeholder="Nazwa produktu">
      <input id="numer-harmonogramu" placeholder="Numer harmonogramu">

      <h3>Okresy</h3>
      <button id="btn-dodaj-okres">+ Dodaj okres</button>

      <table id="harmonogram-table"></table>

      <div style="margin-top:1.5rem;">
        <button id="btn-export-pdf">Pobierz jako PDF</button>
        <button id="btn-zapisz-harmonogram">Zapisz harmonogram</button>
        <button id="btn-anuluj" style="background:#757575; margin-left:1rem;">Anuluj</button>
      </div>
    </div>

    <h2>Lista harmonogramów</h2>
    <div id="harmonogramy-list"></div>
  </div>

</body>
</html>
